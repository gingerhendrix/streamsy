name: Publish npm packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package manifests and build output
        run: |
          bun run typecheck
          bun run lint
          bun run format:check
          bun run build
          bun run pack:dry-run

      - name: Publish packages with provenance
        run: |
          set -euo pipefail
          for dir in \
            packages/core \
            packages/storage-memory \
            packages/storage-sqlite \
            packages/storage-durable-object
          do
            (cd "$dir" && npm publish --provenance --access public)
          done
