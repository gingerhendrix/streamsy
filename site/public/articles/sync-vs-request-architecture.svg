<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" width="780" height="500" role="img" aria-labelledby="title desc">
  <title id="title">Request-based versus sync-based application architecture</title>
  <desc id="desc">In request-based architecture, every UI query crosses the network to the server. In sync-based architecture, the server synchronizes with a local database and the UI queries that database locally.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .heading { fill: #64748b; font: 700 18px ui-sans-serif, system-ui, sans-serif; letter-spacing: .02em; }
      .caption { fill: #64748b; font: 500 13px ui-sans-serif, system-ui, sans-serif; }
      .node-title { fill: #f8fafc; font: 700 18px ui-sans-serif, system-ui, sans-serif; }
      .node-subtitle { fill: #e2e8f0; font: 500 12px ui-sans-serif, system-ui, sans-serif; }
      .flow-label { fill: #f8fafc; font: 700 11px ui-sans-serif, system-ui, sans-serif; letter-spacing: .08em; }
      .node { fill: #3f4756; stroke: #94a3b8; stroke-width: 1.5; }
      .flow { fill: none; stroke: #64748b; stroke-width: 3; marker-start: url(#arrow); marker-end: url(#arrow); }
      .badge-network { fill: #8a5a44; stroke: #d6a184; stroke-width: 1; }
      .badge-local { fill: #416f68; stroke: #83b8ad; stroke-width: 1; }
    </style>
  </defs>

  <g id="request-based">
    <text class="heading" x="40" y="42">Request-based</text>
    <text class="caption" x="40" y="66">The network sits directly on the query path.</text>

    <rect class="node" x="70" y="105" width="190" height="104" rx="14"/>
    <text class="node-title" x="165" y="152" text-anchor="middle">Server</text>
    <text class="node-subtitle" x="165" y="176" text-anchor="middle">remote source of truth</text>

    <rect class="node" x="520" y="105" width="190" height="104" rx="14"/>
    <text class="node-title" x="615" y="152" text-anchor="middle">UI</text>
    <text class="node-subtitle" x="615" y="176" text-anchor="middle">renders remote results</text>

    <path class="flow" d="M 276 157 H 504"/>
    <rect class="badge-network" x="330" y="120" width="120" height="28" rx="14"/>
    <text class="flow-label" x="390" y="139" text-anchor="middle">NETWORK</text>
    <text class="caption" x="390" y="183" text-anchor="middle">queries / requests</text>
  </g>

  <path d="M 40 250 H 740" stroke="#64748b" stroke-width="1" stroke-dasharray="4 8" opacity=".8"/>

  <g id="sync-based">
    <text class="heading" x="40" y="292">Sync-based</text>
    <text class="caption" x="40" y="316">The network moves changes; the query path stays local.</text>

    <rect class="node" x="40" y="355" width="170" height="104" rx="14"/>
    <text class="node-title" x="125" y="402" text-anchor="middle">Server</text>
    <text class="node-subtitle" x="125" y="426" text-anchor="middle">canonical state</text>

    <rect class="node" x="305" y="355" width="170" height="104" rx="14"/>
    <text class="node-title" x="390" y="402" text-anchor="middle">Local DB</text>
    <text class="node-subtitle" x="390" y="426" text-anchor="middle">local materialized state</text>

    <rect class="node" x="570" y="355" width="170" height="104" rx="14"/>
    <text class="node-title" x="655" y="402" text-anchor="middle">UI</text>
    <text class="node-subtitle" x="655" y="426" text-anchor="middle">renders local results</text>

    <path class="flow" d="M 226 407 H 289"/>
    <path class="flow" d="M 491 407 H 554"/>

    <rect class="badge-network" x="224" y="348" width="66" height="25" rx="12.5"/>
    <text class="flow-label" x="257" y="365" text-anchor="middle">SYNC</text>
    <text class="caption" x="257" y="447" text-anchor="middle">network</text>

    <rect class="badge-local" x="489" y="348" width="68" height="25" rx="12.5"/>
    <text class="flow-label" x="523" y="365" text-anchor="middle">QUERY</text>
    <text class="caption" x="523" y="447" text-anchor="middle">local</text>
  </g>
</svg>
